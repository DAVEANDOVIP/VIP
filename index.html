<title>Mundial 2026 — lite</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');

:root {
  /* Mexico palette */
  --mx-green:   #006847;
  --mx-green2:  #00835b;
  --mx-green3:  #00a36c;
  --mx-red:     #ce1126;
  --mx-red2:    #e8192c;
  --mx-white:   #f5f5f0;
  --mx-gold:    #d4a520;
  --mx-gold2:   #f0c840;

  /* surfaces */
  --card:   #0a1a12;
  --card2:  #0e2018;
  --border: rgba(0,104,71,.35);

  /* text */
  --text:   #e8f0eb;
  --muted:  #6b8c7a;

  /* status */
  --live:   #e8192c;
  --green:  #00c878;
  --amber:  #f0c840;

  /* fonts */
  --font:  'Barlow', system-ui, sans-serif;
  --mono:  'Barlow Condensed', ui-monospace, monospace;
  --display: 'Barlow Condensed', system-ui, sans-serif;

  /* layout (xat = xatobil overlay offsets) */
  --xat-nav:   62px;
  --xat-left:  28px;
  --xat-right: 14px;
  --pw: clamp(180px, 18vw, 240px);
  --pwfit: min(var(--pw), calc((100vw - var(--xat-left) - var(--xat-right) - 12px) / 2));
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  background: transparent;
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}

input { -webkit-user-select: text; user-select: text; }
img   { -webkit-user-drag: none; user-drag: none; }
button { font-family: inherit; }

/* ── app shell ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  padding: calc(var(--xat-nav) + 4px) var(--xat-right) 8px var(--xat-left);
  gap: 8px;
}

/* ── hidden bar stubs (keep layout clean) ── */
.bar { display: none !important; }
/* ── toggle bar ── */
.toggle-bar {
  display: flex;
  gap: 5px;
  padding: 8px 8px 0;
  flex: 0 0 auto;
  position: relative;
  z-index: 2;
}

.toggle-btn {
  flex: 1;
  font-family: var(--display);
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 5px 4px;
  border-radius: 8px;
  border: 1px solid rgba(0,104,71,.35);
  background: rgba(0,40,20,.4);
  color: var(--muted);
  cursor: pointer;
  transition: all .18s;
  pointer-events: auto;
}

.toggle-btn:hover {
  border-color: rgba(0,163,108,.5);
  color: var(--mx-green3);
  background: rgba(0,80,40,.4);
}

.toggle-btn.active {
  background: linear-gradient(135deg, var(--mx-green) 0%, var(--mx-green2) 100%);
  border-color: var(--mx-green3);
  color: #fff;
  box-shadow: 0 2px 10px rgba(0,104,71,.4);
}

/* single panel: right side only */
.panels {
  justify-content: flex-end !important;
}


/* ── two-panel layout ── */
.panels {
  flex: 0 1 auto;
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  gap: 10px;
  min-height: 0;
}

/* ── PANEL — Mexico-themed card ── */
.panel {
  width: var(--pwfit);
  display: flex;
  flex-direction: column;
  min-height: 0;
  pointer-events: auto;
  container-type: inline-size;
  position: relative;
  overflow: hidden;

  /* dark green base */
  background: linear-gradient(175deg, #0c1f15 0%, #091810 55%, #070f0a 100%);
  border-radius: 18px;
  padding: 0;

  /* green border + subtle glow */
  border: 1px solid rgba(0, 104, 71, .55);
  box-shadow:
    0 0 0 1px rgba(0,168,108,.10),
    0 20px 50px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(0,200,120,.08);
}

/* tricolor top stripe: green | white | red */
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg,
    var(--mx-green) 0%   33.3%,
    #f0f0ea         33.3% 66.6%,
    var(--mx-red)   66.6% 100%
  );
  border-radius: 18px 18px 0 0;
  z-index: 3;
}

/* faint diagonal texture */
.panel::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 18px,
    rgba(255,255,255,.012) 18px,
    rgba(255,255,255,.012) 19px
  );
  pointer-events: none;
  z-index: 0;
  border-radius: inherit;
}

/* inner padding wrapper so z-index stacking works */
.panel > * { position: relative; z-index: 2; }

/* ── panel header ── */
.panel h2 {
  margin: 0;
  padding: 10px 11px 8px;
  font-family: var(--display);
  font-size: .78rem;
  font-weight: 800;
  letter-spacing: .10em;
  text-transform: uppercase;
  color: var(--mx-green3);
  display: flex;
  align-items: center;
  gap: 7px;
  flex: 0 0 auto;
  border-bottom: 1px solid rgba(0,104,71,.3);
}

.panel h2 .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--mx-green3);
  box-shadow: 0 0 6px var(--mx-green3);
  flex: 0 0 auto;
}

/* ── scrollable match list ── */
.list {
  flex: 1 1 auto;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 6px 8px 8px;
}

.list::-webkit-scrollbar { width: 4px; }
.list::-webkit-scrollbar-thumb {
  background: rgba(0,163,108,.5);
  border-radius: 10px;
}
.list::-webkit-scrollbar-track { background: transparent; }

/* ── empty state ── */
.empty {
  color: rgba(0,163,108,.4);
  font-family: var(--display);
  font-size: .8rem;
  font-weight: 600;
  letter-spacing: .05em;
  text-align: center;
  padding: 24px 6px;
}

/* ── match card ── */
.match {
  background: rgba(0, 60, 35, .35);
  border: 1px solid rgba(0, 104, 71, .28);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color .18s, box-shadow .18s, background .18s;
}

.match:hover {
  background: rgba(0, 80, 48, .45);
  border-color: rgba(0, 163, 108, .5);
  box-shadow: 0 3px 14px rgba(0, 104, 71, .25);
}

.match.live {
  background: rgba(206, 17, 38, .08) !important;
  border-color: rgba(232, 25, 44, .5) !important;
  box-shadow: 0 0 0 1px rgba(232, 25, 44, .2) !important;
}

/* ── match row grid ── */
.row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 6px;
  padding: 7px 9px;
  min-height: 38px;
}

/* ── teams ── */
.team {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--display);
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: .03em;
  color: var(--mx-white);
  min-width: 0;
}

.team.away {
  justify-content: flex-end;
  min-width: 0;
}

.team img {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  object-fit: cover;
  flex: 0 0 auto;
  border: 1px solid rgba(0, 163, 108, .4);
  box-shadow: 0 1px 5px rgba(0,0,0,.5);
}

.flag-fallback {
  width: 18px;
  height: 18px;
  min-width: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(0, 163, 108, .4);
  box-shadow: 0 1px 5px rgba(0,0,0,.5);
  color: var(--mx-white);
  font-size: .9rem;
}

.team span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── score / time center block ── */
.mid {
  text-align: center;
  min-width: 58px;
}

.score {
  font-family: var(--display);
  font-weight: 800;
  font-size: 1rem;
  font-variant-numeric: tabular-nums;
  letter-spacing: .04em;
}

.score.fin { color: var(--mx-gold2); }
.score.lv  { color: var(--mx-red2); font-size: 1.05rem; }

.ko {
  font-family: var(--display);
  font-weight: 700;
  font-size: .9rem;
  color: #7dd5b0;
}

.minute {
  font-family: var(--display);
  font-size: .62rem;
  font-weight: 600;
  color: var(--mx-red2);
}

.cd {
  font-family: var(--display);
  font-size: .6rem;
  font-weight: 600;
  color: var(--amber);
}

/* ── status badge ── */
.badge {
  font-family: var(--display);
  font-size: .58rem;
  font-weight: 700;
  letter-spacing: .06em;
  padding: 2px 8px;
  border-radius: 999px;
  border: 1px solid var(--border);
  color: var(--muted);
  justify-self: end;
  white-space: nowrap;
}

.badge.lv {
  color: #fff;
  background: var(--mx-red);
  border-color: transparent;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  animation: pulse 1.6s ease-in-out infinite;
}

.badge.lv::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #fff;
  animation: blink 1.2s infinite;
}

.badge.ft {
  color: var(--mx-gold2);
  background: rgba(212,165,32,.12);
  border-color: rgba(212,165,32,.35);
  font-weight: 700;
}

/* ── provider bar ── */
.provbar {
  display: none;
}

.pv {
  display: inline-flex;
  align-items: center;
  text-decoration: none;
  flex: 0 0 auto;
}

.pv img {
  height: 12px;
  max-width: 26px;
  object-fit: contain;
  background: rgba(255,255,255,.85);
  border-radius: 2px;
  padding: 0 1px;
  display: block;
}

.pv.txt, .pv.more {
  font-size: .55rem;
  color: var(--mx-green3);
  background: rgba(0,163,108,.12);
  border-radius: 4px;
  padding: 1px 4px;
  white-space: nowrap;
  font-family: var(--display);
  font-weight: 600;
}

.pv.more { color: var(--muted); background: rgba(255,255,255,.06); }
.pv.none { color: var(--muted); font-size: .6rem; }

/* ── sign (hidden) ── */
.sign { display: none; }

/* ── clear btn (hidden, still functional) ── */
.clear-btn[hidden] { display: none; }

/* ── RTL support ── */
[dir="rtl"] .team.away { justify-content: flex-start; }
[dir="rtl"] .badge     { justify-self: start; }

/* ── container queries ── */
@container (max-width: 200px) {
  .team span { font-size: .62rem; }
  .score     { font-size: .85rem; }
  .ko        { font-size: .8rem; }
  .team img  { width: 15px; height: 15px; }
  .badge     { font-size: .52rem; padding: 1px 5px; }
  .minute, .cd { font-size: .55rem; }
  .pv img    { height: 11px; max-width: 24px; }
}

@container (max-width: 170px) {
  .team span { display: none; }
  .row { grid-template-columns: auto 1fr auto; gap: 4px; padding: 5px 6px; }
}

/* ── responsive ── */
@media (max-width: 1000px) {
  :root { --pw: clamp(150px, 21vw, 196px); }
}

@media (max-height: 560px) {
  .panel h2 { font-size: .7rem; padding: 7px 10px 6px; }
  .row { min-height: 33px; padding: 4px 8px; }
  .provbar { padding: 2px 8px 3px; }
}

@media (max-height: 470px) {
  .panel h2 .dot { display: none; }
  .row { min-height: 30px; }
  .panel { border-radius: 12px; }
}

/* ── animations ── */
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(232,25,44,.5); }
  60%       { box-shadow: 0 0 0 7px rgba(232,25,44,0); }
}

@keyframes blink {
  50% { opacity: .35; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; }
}

/* ── pill / select (legacy, keep for hidden stubs) ── */
.pill, select {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 4px 9px;
  font-size: .7rem;
  font-weight: 600;
  outline: none;
}
</style>

    </section>
  </div>
</div>
